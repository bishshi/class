name: 网站建议
description: 对网站首页、同学资料、照片墙、内容文案或交互体验提出建议
title: "suggestion: "
labels:
  - site-suggestion
body:
  - type: markdown
    attributes:
      value: |
        感谢你愿意帮我们把网站做得更好。
        请尽量说明建议涉及的位置、你希望改成什么样，以及这样修改的原因。
  - type: dropdown
    id: section
    attributes:
      label: 建议涉及的网站部分
      description: 请选择最接近的部分；如果不确定，可以选择「其他」。
      options:
        - 首页
        - 如今的我们
        - 照片墙
        - 班级故事
        - 网站文案
        - 页面布局
        - 移动端体验
        - 交互功能
        - 其他
    validations:
      required: true
  - type: textarea
    id: current
    attributes:
      label: 当前情况
      description: 目前你看到的问题、觉得不方便的地方，或想改进的位置。
      placeholder: 例如：照片墙某个专题的入口不太明显，手机上需要滑很久才能找到。
    validations:
      required: true
  - type: textarea
    id: suggestion
    attributes:
      label: 建议内容
      description: 你希望网站如何调整？可以写具体文案、布局、功能或展示方式。
      placeholder: 例如：希望在首页增加照片墙入口，并按「教室 / 活动 / 毕业日」展示几个快捷入口。
    validations:
      required: true
  - type: textarea
    id: reason
    attributes:
      label: 建议原因
      description: 为什么你觉得这个建议值得做？它会帮助谁，或解决什么问题？
      placeholder: 例如：这样第一次访问网站的同学可以更快找到照片，也更容易回忆起不同阶段的活动。
    validations:
      required: true
  - type: input
    id: page
    attributes:
      label: 相关页面或链接
      description: 可选。填写具体页面地址、截图链接或相关位置说明。
      placeholder: /photos 或 首页顶部
  - type: textarea
    id: extra
    attributes:
      label: 补充信息
      description: 可选。可以补充截图说明、参考网站、更多背景或其他想法。
      placeholder: 其他想补充的内容。
